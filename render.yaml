# ╔══════════════════════════════════════════════════════╗
# ║  StockFlow — render.yaml (déploiement sur Render)    ║
# ╚══════════════════════════════════════════════════════╝

services:
  # ─── WEB SERVICE ──────────────────────────────────────
  - type: web
    name: stockflow
    runtime: node
    rootDir: backend
    buildCommand: npm install && cd ../frontend && npm install && npm run build && cp -r dist ../backend/
    startCommand: node server.js
    healthCheckPath: /api/auth/me
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

  # ─── PostgreSQL DATABASE ───────────────────────────────
databases:
  - name: stockflow-db
    databaseName: stockflow
    user: stockflow_user
    plan: free
